<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--Adapta ao tamanho da tela-->
    <link rel="stylesheet" href="stylebolos.css">
    <title>Bolos Sabores</title>
</head>
<body>
    <main class="container">
        <header class="topo">
            <div class="voltar">
                &#10094;
            </div>
            <h1>Bolos Sabores</h1>
        </header>
        <section class="lista-bolos">
            <article class="bolo-item"> <!--Chama imagens de um site gratuito"-->
                <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?q=80&w=800&auto=format&fit=crop"
                     alt="Bolo de Chocolate">
                <h2>Chocolate</h2>
                <span class="preco">R$39,90 KG</span>
            </article>
            <article class="bolo-item">
                <img src="https://images.unsplash.com/photo-1606313564200-e75d5e30476c?q=80&w=800&auto=format&fit=crop"
                     alt="Brownie">
                <h2>Brownie</h2>
                <span class="preco">R$29,90 KG</span>
            </article>
            <article class="bolo-item">
                <img src="https://images.unsplash.com/photo-1533134242443-d4fd215305ad?q=80&w=800&auto=format&fit=crop"
                     alt="Cheesecake Blueberry">
                <h2>Blueberry</h2>
                <span class="preco">R$49,90 KG</span>
            </article>
            <article class="bolo-item">
                <img src="https://images.unsplash.com/photo-1565958011703-44f9829ba187?q=80&w=800&auto=format&fit=crop"
                     alt="Bolo Frutas Vermelhas">
                <h2>Frutas Vermelhas</h2>
                <span class="preco">R$49,90 KG</span>
            </article>
            <article class="bolo-item">
                <img src="https://images.unsplash.com/photo-1621303837174-89787a7d4729?q=80&w=800&auto=format&fit=crop"
                     alt="Bolo 4 Leites">
                <h2>4 Leites</h2>
                <span class="preco">R$29,90 KG</span>
            </article>
            <article class="bolo-item">
                <img src="https://images.unsplash.com/photo-1614707267537-b85aaf00c4b7?q=80&w=800&auto=format&fit=crop"
                     alt="Red Velvet">
                <h2>Red Velvet</h2>
                <span class="preco">R$59,90 KG</span>
            </article>
        </section>
        <button class="btn-pedido">
            Fazer encomenda
        </button>
    </main>
</body>
</html>
